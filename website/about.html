<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MakeBiz • About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner shell">
      <a class="brand" href="./index.html">MakeBiz</a>
      <nav class="nav">
        <a href="./index.html" data-i18n="nav_solution"></a>
        <a href="./companies.html" data-i18n="nav_companies"></a>
        <a href="./rfq.html" data-i18n="nav_rfq"></a>
        <a href="./analytics.html" data-i18n="nav_analytics"></a>
        <a class="active" href="./about.html" data-i18n="nav_about"></a>
        <a href="./dashboard.html">Dashboard</a>
      </nav>
      <div class="toolbar">
        <select class="lang" aria-label="Language"><option value="ru">RU</option><option value="uz">UZ</option><option value="en">EN</option></select>
        <button class="btn btn-soft login-btn" data-i18n="nav_login"></button>
      </div>
    </div>
  </header>

  <main class="page shell">
    <section class="section fade-up">
      <h2 data-i18n="about_title"></h2>
      <p data-i18n="about_lead"></p>
      <div class="grid-3" style="margin-top:14px;">
        <article class="tile">
          <h3 data-i18n="about_problem_title"></h3>
          <p data-i18n="about_problem_text"></p>
        </article>
        <article class="tile">
          <h3 data-i18n="about_adv_title"></h3>
          <p data-i18n="about_adv_text"></p>
        </article>
        <article class="tile">
          <h3 data-i18n="about_vision_title"></h3>
          <p data-i18n="about_vision_text"></p>
        </article>
      </div>
    </section>

    <section class="section fade-up">
      <h2 data-i18n="roadmap_title"></h2>
      <div class="timeline">
        <div class="timeline-item"><p data-i18n="roadmap_1"></p></div>
        <div class="timeline-item"><p data-i18n="roadmap_2"></p></div>
        <div class="timeline-item"><p data-i18n="roadmap_3"></p></div>
        <div class="timeline-item"><p data-i18n="roadmap_4"></p></div>
      </div>
    </section>
  </main>

  <footer class="footer" data-i18n="footer"></footer>

  <button id="aiFab" class="ai-fab" type="button">AI</button>
  <aside id="aiPanel" class="ai-panel">
    <header data-i18n="ai_title"></header>
    <div id="aiMessages" class="body ai-chat-body"></div>
    <form id="aiForm" class="ai-chat-form">
      <input id="aiInput" class="input" data-i18n-placeholder="ai_placeholder">
      <button class="btn btn-primary" type="submit" data-i18n="ai_send"></button>
    </form>
  </aside>

  <script src="./js/i18n.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
